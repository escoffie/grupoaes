<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Sombra suave para los sectores y el círculo central -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#162640" flood-opacity="0.15"/>
    </filter>
    <filter id="hub-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#162640" flood-opacity="0.12"/>
    </filter>
    
    <!-- Máscara circular para suavizar bordes de imágenes si es necesario -->
    <clipPath id="circle-clip">
      <circle cx="250" cy="250" r="220" />
    </clipPath>
  </defs>

  <!-- Grupo contenedor principal para animaciones globales -->
  <g class="espiral-container">
    
    <!-- BASE INFERIOR (Gris Claro / Blanco 3D) -->
    <path class="espiral-base" 
          d="M 30 250 A 220 220 0 0 0 470 250 L 335 250 A 85 85 0 0 1 165 250 Z" 
          fill="#f4f6f9" 
          stroke="#e2e8f0" 
          stroke-width="1.5" 
          filter="url(#drop-shadow)"/>

    <!-- SECTOR AES SEGURIDAD (Azul Marino) - de 180° a 105° (antihorario) -->
    <g class="sector-group sector-seguridad" style="cursor: pointer;">
      <path d="M 30 250 A 220 220 0 0 1 193.06 37.5 L 228.08 167.95 A 85 85 0 0 0 165 250 Z" 
            fill="#162640" 
            stroke="#111f35" 
            stroke-width="1"/>
      <!-- Logo AES Seguridad -->
      <image href="assets/logos/aes-seguridad.svg" 
             x="75" y="95" 
             width="100" height="70" 
             transform="rotate(-35, 125, 130)"/>
    </g>

    <!-- SECTOR AES LIMPIEZA (Turquesa) - de 105° a 45° (antihorario) -->
    <g class="sector-group sector-limpieza" style="cursor: pointer;">
      <path d="M 193.06 37.5 A 220 220 0 0 1 405.56 94.44 L 310.15 189.92 A 85 85 0 0 0 228.08 167.95 Z" 
            fill="#00a896" 
            stroke="#008f80" 
            stroke-width="1"/>
      <!-- Logo AES Limpieza -->
      <image href="assets/logos/aes-limpieza.svg" 
             x="245" y="55" 
             width="100" height="70" 
             transform="rotate(15, 295, 90)"/>
    </g>

    <!-- SECTOR AES COMERCIAL (Rojo) - de 45° a 0° (antihorario) -->
    <g class="sector-group sector-comercial" style="cursor: pointer;">
      <path d="M 405.56 94.44 A 220 220 0 0 1 470 250 L 335 250 A 85 85 0 0 0 310.15 189.92 Z" 
            fill="#e63946" 
            stroke="#cc2a36" 
            stroke-width="1"/>
      <!-- Logo AES Comercial -->
      <image href="assets/logos/aes-comercial.svg" 
             x="365" y="145" 
             width="100" height="70" 
             transform="rotate(65, 415, 180)"/>
    </g>

    <!-- ANILLO/CENTRO BLANCO (Grupo AES) -->
    <g class="centro-hub" filter="url(#hub-shadow)">
      <circle cx="250" cy="250" r="85" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
      <!-- Logo Grupo AES Oscuro -->
      <image href="assets/logos/grupo-aes-oscuro.svg" 
             x="185" y="215" 
             width="130" height="70"/>
    </g>
    
  </g>
</svg>
