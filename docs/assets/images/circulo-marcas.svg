              <path d="M328.7,100.1L326.7,100.1L310.3,132.4L317.8,132.4L327.5,113L336.8,132.4L344.1,132.4L328.7,100.1Z" style="fill:rgb(33,42,65);fill-rule:nonzero;"/>
