              <path d="M88,239C88,239 79.2,203.7 112.2,166.8L153.7,193.1C153.7,193.1 161.8,199.6 163.2,206.3C164.6,213 163.9,226.3 162,242.4L142.6,254.2C142.6,254.2 127.8,263.5 115.7,256.8C103.6,250.1 88,239 88,239Z" style="fill:rgb(234,234,234);fill-rule:nonzero;"/>
            </g>
            <g transform="matrix(0.541973,0.840396,-0.840396,0.541973,233.388982,-2.184921)">
