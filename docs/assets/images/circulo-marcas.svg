<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Sombra proyectada del conjunto completo -->
    <filter id="global-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#162640" flood-opacity="0.16"/>
    </filter>
    
    <!-- Filtro de sombra individual para dar volumen entre los sectores -->
    <filter id="sector-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="-2" dy="5" stdDeviation="5" flood-color="#0b1220" flood-opacity="0.35"/>
    </filter>

    <!-- Filtro de sombra exclusivo para el centro-hub -->
    <filter id="hub-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#162640" flood-opacity="0.2"/>
    </filter>

    <!-- Degradado radial para darle volumen al círculo central -->
    <radialGradient id="hub-gradient" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#f3f6f9"/>
      <stop offset="100%" stop-color="#dce3eb"/>
    </radialGradient>

    <!-- Degradados lineales para dar volumen a las rebanadas -->
    <linearGradient id="comercial-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5fbf6"/>
      <stop offset="100%" stop-color="#c1eac7"/>
    </linearGradient>

    <linearGradient id="limpieza-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2fafc"/>
      <stop offset="100%" stop-color="#badff5"/>
    </linearGradient>

    <linearGradient id="seguridad-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7f9fc"/>
      <stop offset="100%" stop-color="#c5d8ed"/>
    </linearGradient>

    <linearGradient id="base-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>

  <!-- Grupo contenedor con la sombra global de la estructura circular completa -->
  <g class="espiral-container" filter="url(#global-shadow)">
    
    <!-- BASE INFERIOR (Gris Claro / Blanco 3D) - Ocupa los restantes 165 grados en la base -->
    <path class="espiral-base" 
          d="M 26.92 279.37 A 225 225 0 0 0 473.08 279.37 L 334.27 261.09 A 85 85 0 0 1 165.73 261.09 Z" 
          fill="url(#base-gradient)" 
          stroke="#e2e8f0" 
          stroke-width="1.5"/>

    <!-- 1. SECTOR AES COMERCIAL (Verde Claro, R=225, 65 grados) -->
    <g class="sector-group sector-comercial" filter="url(#sector-shadow)" style="cursor: pointer;">
      <path d="M 370.89 60.24 A 225 225 0 0 1 473.08 279.37 L 334.27 261.09 A 85 85 0 0 0 295.67 178.31 Z" 
            fill="url(#comercial-gradient)" 
            stroke="#c8e6ce" 
            stroke-width="1"/>
      <!-- Logo vectorial de AES Comercial inline -->
      <g transform="translate(250, 250) rotate(-25) translate(155, 0) rotate(90) scale(0.57777) translate(-45, -52)">
        <g transform="matrix(1,0,0,1,-545.028777,-172.575467)">
          <g>
            <g transform="matrix(0.465407,-0.885097,0.885097,0.465407,118.570627,645.51591)">
              <path d="M568.3,204.7L567.8,218.1L567.2,235.7C567.2,236.1 567.2,236.5 566.7,236.7L547.5,246.5C547.2,246.6 547.1,246.7 546.9,246.6C546.7,246.5 546.4,246.2 546.5,245.9L547.7,221.2L548.8,196.2C548.8,194.5 550.2,192.6 551.7,191.8L591.3,170.9C593,170 594.9,169.9 596.6,170.9L609.2,178.7L636.4,195.5C638,196.4 638.6,198 638.5,199.9L637.8,214.4L636.4,245.7C636.3,247.8 635.3,249.3 633.4,250.3L586.6,275C585.5,275.6 583.7,275.4 582.7,274.8L566.8,265.1C566.5,264.7 566.4,264.3 566.8,264L617,237.5L618.2,207.6L592.7,191.7L568.3,204.6L568.3,204.7Z" style="fill:rgb(179,34,23);fill-rule:nonzero;"/>
            </g>
            <g transform="matrix(0.465407,-0.885097,0.885097,0.465407,118.570627,645.51591)">
              <path d="M592.7,191.8L591.9,170.6C591.9,170.6 593.6,169.7 595.7,170.6C597.1,170.9 620.2,185.6 636.4,195.6C636.4,195.6 637.4,196.2 637.9,197.2C638.4,198.2 638.6,199.2 638.5,199.8C638.5,200.5 636.5,245.4 636.5,245.4C636.5,245.4 636.7,248 634.8,249.5L617,237.5L618.2,207.6" style="fill:white;fill-rule:nonzero;"/>
            </g>
          </g>
        </g>
      </g>
    </g>

    <!-- 2. SECTOR AES LIMPIEZA (Celeste Claro, R=225, 65 grados) - Con sombra proyectada sobre Comercial -->
    <g class="sector-group sector-limpieza" filter="url(#sector-shadow)" style="cursor: pointer;">
      <path d="M 129.11 60.24 A 225 225 0 0 1 370.89 60.24 L 295.67 178.31 A 85 85 0 0 0 204.33 178.31 Z" 
