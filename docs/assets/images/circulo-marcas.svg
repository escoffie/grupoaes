            </g>
            <path d="M326.3,75.6C326.3,75.6 330.3,87.8 326.7,95.7C326.7,95.7 333,89.6 346,89.3C343.7,88.5 338.3,85.6 331.1,88.5C331.1,87 331.1,78.9 326.2,75.6L326.3,75.6Z" style="fill:rgb(103,165,220);fill-rule:nonzero;"/>
            <path d="M328.5,94.3C328.5,94.3 334.5,89.6 346.2,89.2C346.2,89.2 338.5,85.2 331.3,88.4C331.3,88.4 331.3,82.5 329,78.5C329,78.5 330.9,87.1 328.5,94.2L328.5,94.3Z" style="fill:rgb(35,42,67);fill-rule:nonzero;"/>
            <path d="M344.7,41.4C344.7,41.4 344.7,51.3 334.7,53.3C334.7,53.3 345.1,55.2 344.7,64.6C344.7,64.6 346.3,52.7 355.6,53.5C355.6,53.5 345.9,52 344.7,41.4Z" style="fill:rgb(33,42,65);fill-rule:nonzero;"/>
            <path d="M361.8,59.5C361.8,59.5 361.8,65.6 355.6,66.9C355.6,66.9 362.1,68.1 361.8,73.9C361.8,73.9 362.8,66.5 368.6,67C368.6,67 362.6,66.1 361.8,59.5Z" style="fill:rgb(113,113,119);fill-rule:nonzero;"/>
            <path d="M348.2,72.5C348.2,72.5 348.2,76.5 344.2,77.3C344.2,77.3 348.4,78.1 348.2,81.9C348.2,81.9 348.8,77.1 352.6,77.4C352.6,77.4 348.7,76.8 348.2,72.5Z" style="fill:rgb(103,165,220);fill-rule:nonzero;"/>
          </g>
        </g>
      </g>
    </g>

    <!-- 3. SECTOR AES SEGURIDAD (Azul Claro, R=225, 65 grados) - Con sombra proyectada sobre Limpieza -->
    <g class="sector-group sector-seguridad" filter="url(#sector-shadow)" style="cursor: pointer;">
      <path d="M 26.92 279.37 A 225 225 0 0 1 129.11 60.24 L 204.33 178.31 A 85 85 0 0 0 165.73 261.09 Z" 
            fill="url(#seguridad-gradient)" 
            stroke="#c8d8ec" 
            stroke-width="1"/>
      <!-- Logo vectorial de AES Seguridad inline -->
      <g transform="translate(250, 250) rotate(-155) translate(155, 0) rotate(90) scale(0.60975) translate(-41, -49.5)">
        <g transform="matrix(1,0,0,1,-76.72681,-172.583688)">
