    <!-- 4. ANILLO/CENTRO BLANCO (Grupo AES) - Con sombra sobre todo el centro -->
    <g class="centro-hub" filter="url(#hub-shadow)">
      <circle cx="250" cy="250" r="85" fill="url(#hub-gradient)" stroke="#e2e8f0" stroke-width="1.2"/>
      <g transform="translate(185, 230) scale(0.80745)">
