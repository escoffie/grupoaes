        <g transform="matrix(1,0,0,1,-310.3,-30.8)">
          <g>
            <path d="M383.6,60.1C383.6,76.2 370.7,89.3 354.8,89.3C338.9,89.3 353.5,89.3 352.8,89.3C359.3,88.8 365.2,85.9 369.5,81.5C376.3,76.4 380.8,68.2 380.8,58.8C380.8,43.6 369,31.2 354.2,30.9L354.8,30.9C370.7,30.9 383.6,44 383.6,60.1Z" style="fill:rgb(103,165,220);fill-rule:nonzero;"/>
